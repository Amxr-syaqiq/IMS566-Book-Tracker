<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>BOOK TRACKER DASHBOARD</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body
        {
            background-color: lightyellow;
            font-family: Arial;
        }

        h1
        {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 20px;
        }

        ul
        {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: navy;
        }

        li
        {
            float: left;
        }

        li a
        {
            display: block;
            color: white;
            text-align: center;
            padding: 15px 20px;
            text-decoration: none;
        }

        li a:hover
        {
            background-color: royalblue;
        }

        table
        {
            width: 70%;
            margin-top: 30px;
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
            background-color: white;
        }

        table, th, td
        {
            border: 2px solid darkblue;
        }

        th
        {
            background-color: lightblue;
        }

        th, td
        {
            padding: 15px;
            text-align: center;
        }

        canvas
        {
            display: block;
            margin-left: auto;
            margin-right: auto;
            margin-top: 40px;
            width: 400px !important;
            height: 400px !important;
        }

        @media (max-width: 768px) {
    table {
        width: 100%;
        font-size: 12px;
    }

    th, td {
        padding: 5px;
    }

    h1 {
        font-size: 20px;
    }

    nav {
        font-size: 12px;
    }
}

    </style>
</head>
<body>

    <h1>BOOK TRACKER DASHBOARD</h1>

    <ul>
        <li><a href="dashboard.html">DASHBOARD</a></li>
        <li><a href="books.html">MY BOOKS</a></li>
        <li><a href="completed.html">COMPLETED BOOKS</a></li>
        <li style="float:right"><a href="index.html">LOGOUT</a></li>
    </ul>

    <div class="container mt-4">
    <table class="table table-bordered text-center">
        <tr>
            <th>TOTAL BOOKS</th>
            <th>BOOKS READING</th>
            <th>BOOKS COMPLETED</th>
        </tr>

        <tr>
            <td>10</td>
            <td>4</td>
            <td>6</td>
        </tr>
    </table>
    </div>

    <h2 style="text-align:center; margin-top:40px;">READING PROGRESS</h2>

    <canvas id="myChart"></canvas>

    <script>

        var xValues = ["Reading", "Completed"];
        var yValues = [4, 6];
        var barColors = ["orange", "green"];

        new Chart("myChart",
        {
            type: "pie",
            data:
            {
                labels: xValues,
                datasets: [{
                    backgroundColor: barColors,
                    data: yValues
                }]
            }
        });

    </script>

<footer style="background-color: black; color: white; text-align: center; padding: 15px; margin-top: 40px;">

</footer>

</body>
</html>
