<!DOCTYPE html>
<html>
<head>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <title>BOOK TRACKER LOGIN</title>

    <style>

        body
        {
            background-color: lightblue;
        }

        h1
        {
            color: darkblue;
            background-color: white;
            text-align: center;
            border: 3px solid darkblue;
            padding: 15px;
            margin-top: 40px;
        }

        table
        {
            background-color: white;
            margin-left: auto;
            margin-right: auto;
            margin-top: 40px;
            border: 2px solid darkblue;
            width: 40%;
        }

        td
        {
            padding: 15px;
        }

        input
        {
            width: 100%;
            padding: 8px;
        }

        button
        {
            background-color: darkblue;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
        }

        button:hover
        {
            background-color: royalblue;
        }

        p
        {
            text-align: center;
            color: red;
        }

    </style>
</head>
<body>

    <h1>BOOK TRACKER LOGIN</h1>

    <table>
        <tr>
            <td>USERNAME</td>
            <td><input type="text" id="username"></td>
        </tr>

        <tr>
            <td>PASSWORD</td>
            <td><input type="password" id="password"></td>
        </tr>

        <tr>
            <td colspan="2">
                <button onclick="login()">LOGIN</button>
            </td>
        </tr>
    </table>

    <p id="error"></p>

    <p>USERNAME: user</p>
    <p>PASSWORD: 1234</p>

    <script>

        function login()
        {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            if(username=="user" && password=="1234")
            {
                window.location.href="dashboard.html";
            }

            else
            {
                document.getElementById("error").innerHTML="INVALID USERNAME OR PASSWORD";
            }
        }

    </script>

<footer style="background-color: black; color: white; text-align: center; padding: 15px; margin-top: 40px;">
    <p>© 2026 Book Tracker System</p>
    <p>Developed by: MUHAMMAD AMIR SYAQIQ BIN MOHD FADLI</p>
    <p>Email: amirsyaqiq11@gmail.com</p>
</footer>

</body>
</html>
