<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tracker Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: lightblue;
        }

        .login-box {
            background-color: white;
            border: 3px solid darkblue;
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: darkblue;
            margin-bottom: 20px;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<main class="container">

    <div class="login-box">
        <h1>Login</h1>

        <!-- Form -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control">
        </div>

        <button class="btn btn-primary w-100" onclick="login()">Login</button>

        <p id="error" class="text-danger text-center mt-3"></p>

        <hr>

        <!-- Demo Info -->
        <p class="text-center text-muted small">
            Username: <b>amir syaqiq</b><br>
            Password: <b>444666888</b>
        </p>
    </div>

</main>

<footer>
    <p>© 2026 Book Tracker System</p>
    <p>Developed by: MUHAMMAD AMIR SYAQIQ BIN MOHD FADLI</p>
    <p>Email: amirsyaqiq11@gmail.com</p>
</footer>

<script>
function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (username === "amir syaqiq" && password === "444666888") {
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("error").innerHTML = "Invalid username or password";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
